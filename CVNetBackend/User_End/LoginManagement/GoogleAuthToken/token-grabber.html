<!DOCTYPE html>
<html>
<head>
    <title>CV.net Token Grabber</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; max-width: 500px; margin: auto; }
        .box { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; background: #fafafa; }
        #token-display { width: 100%; height: 150px; margin-top: 10px; word-break: break-all; }
        input { width: 90%; padding: 10px; margin: 5px 0; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; width: 100%; margin-top: 10px; }
        .google-btn { background: #4285F4; color: white; }
        .email-btn { background: #34A853; color: white; }
    </style>
</head>
<body>
    <h2>CV.net Token Grabber</h2>

    <div class="box">
        <h3>Option 1: Google</h3>
        <button id="google-btn" class="google-btn">Sign in with Google</button>
    </div>

    <div class="box">
        <h3>Option 2: Email + Password</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="email-btn" class="email-btn">Get Email Token</button>
    </div>
    
    <div id="status" style="font-weight:bold; color: blue;"></div>
    <textarea id="token-display" readonly placeholder="Your idToken will appear here..."></textarea>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // CONFIG: Replace with your actual Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyD8DJrZoKSAUvz6Pb8Vvg8ajNcO7L5d0Mg",

            authDomain: "cvnet2026-capstone.firebaseapp.com",

            projectId: "cvnet2026-capstone",

            storageBucket: "cvnet2026-capstone.firebasestorage.app",

            messagingSenderId: "1048505776416",

            appId: "1:1048505776416:web:5642d696c662b198a3ff45",

            measurementId: "G-ZKTCZ8K3RN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const showToken = async (user) => {
            const token = await user.getIdToken(true);
            document.getElementById('token-display').value = token;
            document.getElementById('status').innerText = "Token retrieved! Copy it to Postman.";
        };

        // Google Logic
        document.getElementById('google-btn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, new GoogleAuthProvider());
                await showToken(result.user);
            } catch (e) { document.getElementById('status').innerText = e.message; }
        };

        // Email Logic
        document.getElementById('email-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const result = await signInWithEmailAndPassword(auth, email, password);
                await showToken(result.user);
            } catch (e) { document.getElementById('status').innerText = e.message; }
        };
    </script>
</body>
</html>
