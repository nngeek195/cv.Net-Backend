type User @table {
  id: String! 
  fullName: String!
  email: String!
  employmentStatus: String!
  gpa: Float
  createdAt: Timestamp!
  updatedAt: Timestamp!
  phone: String
  address: String
  profileImageUrl: String
  agreement: String
  appliedJobs: Int @default(value: 0)
  callsForInterview: Int @default(value: 0)
  rejectedJobs: Int @default(value: 0)
  defaultProfileId: UUID
}

type TargetRoleProfile @table(name: "target_role_profiles") {
  id: UUID! @default(expr: "uuidV4()")
  user: User! @ref
  jobRole: String!
  portfolioUrl: String
  currentOrg: String
  currentPosition: String
  personalStatement: String
  aboutMe: String
  cvUrl: String
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type SocialLink @table {
  profile: TargetRoleProfile! @ref
  platformName: String!
  profileUrl: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Skill @table {
  profile: TargetRoleProfile! @ref
  skillName: String!
  level: String! # Enum: `Beginner`, `Intermediate`, `Expert`
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Experience @table {
  profile: TargetRoleProfile! @ref
  companyName: String!
  startDate: Date!
  roleDescription: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  endDate: Date
}

type Education @table {
  profile: TargetRoleProfile! @ref
  degreeTitle: String!
  fieldOfStudy: String!
  organization: String!
  startDate: Date!
  endDate: Date!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  honors: String
  thesisTitle: String
  relevantCoursework: String
}

type Project @table {
  profile: TargetRoleProfile! @ref
  name: String!
  description: String!
  timePeriod: String!
  role: String!
  organization: String!
  sourceLink: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Publication @table {
  profile: TargetRoleProfile! @ref
  title: String!
  description: String!
  sourceLink: String!
  organization: String!
  year: Int!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Certification @table {
  profile: TargetRoleProfile! @ref
  organization: String!
  field: String!
  issueDate: Date!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Membership @table {
  profile: TargetRoleProfile! @ref
  organizationName: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Language @table {
  profile: TargetRoleProfile! @ref
  languageName: String!
  proficiency: String! # Enum: `Beginner`, `Intermediate`, `Expert`
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type TeachingExperience @table {
  profile: TargetRoleProfile! @ref
  coursesTaught: String!
  organization: String!
  timePeriod: String!
  curriculumDescription: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type ResearchExperience @table {
  profile: TargetRoleProfile! @ref
  projectName: String!
  organization: String!
  resultsDescription: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  labOrFieldWork: String
  linkedPublication: Publication
}

type Award @table {
  profile: TargetRoleProfile! @ref
  awardName: String!
  organization: String!
  description: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Volunteer @table {
  profile: TargetRoleProfile! @ref
  organization: String!
  role: String!
  description: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

enum GeneralSkillLevel {
  Beginner
  Intermediate
  Expert
}

type GeneralSkill @table(name: "general_skills") {
  id: UUID! @default(expr: "uuidV4()") 
  jobRole: String! @col(name: "job_role")
  skillName: String! @col(name: "skill_name")
  level: GeneralSkillLevel!
  jobCategory: JobCategory! @ref
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type JobCategory @table(name: "job_categories") {
  id: UUID! @default(expr: "uuidV4()")
  name: String! @unique
  skills: [String!] @col(name: "skills")
  createdAt: Timestamp! @default(expr: "request.time")
}

enum EmployeeCountRange {
  SOLO
  SMALL_2_10
  MID_SIZE_11_50
  GROWING_51_200
  ENTERPRISE_201_1000
  GLOBAL_1000_PLUS
}

enum EmploymentType { INTERNSHIP, FULL_TIME, PART_TIME, CONTRACT }
enum WorkplaceType { REMOTE, HYBRID, ONSITE }
enum SkillLevelRequirement { BEGINNER, INTERMEDIATE, EXPERT }

type Company @table(name: "companies") {
  id: UUID! @default(expr: "uuidV4()")
  name: String! @unique
  logoUrl: String
  description: String
  siteLink: String
  hrEmail: String!
  hrContactPhone: String
  employeeCount: EmployeeCountRange!
  createdAt: Timestamp! @default(expr: "request.time")
}

type CompanyLocation @table(name: "company_locations") {
  id: UUID! @default(expr: "uuidV4()")
  company: Company! @ref
  countryName: String!
  isHeadquarters: Boolean @default(value: false)
}

type Job @table(name: "jobs") {
  id: UUID! @default(expr: "uuidV4()")
  company: Company! @ref
  jobCategory: JobCategory! @ref
  title: String!
  employmentType: EmploymentType!
  workplaceType: WorkplaceType!
  location: String
  openings: Int @default(value: 1)
  description: String!
  responsibilities: String!
  salaryRange: String
  currency: String @default(value: "LKR")
  applicationDeadline: Timestamp!
  expireDate: Timestamp!
  hrContactEmail: String!
  createdAt: Timestamp! @default(expr: "request.time")
}

type JobExperienceRequirement @table(name: "job_experience") {
  id: UUID! @default(expr: "uuidV4()")
  job: Job! @ref
  levelName: String!
  minYears: Int!
  maxYears: Int
}

type JobSkillRequirement @table(name: "job_skills") {
  id: UUID! @default(expr: "uuidV4()")
  job: Job! @ref
  skillName: String!
  requiredLevel: SkillLevelRequirement!
  isVisible: Boolean @default(value: true)
  showLevel: Boolean @default(value: true)
}

type JobEducationRequirement @table(name: "job_education") {
  id: UUID! @default(expr: "uuidV4()")
  job: Job! @ref
  degreeName: String!
}

type JobApplication @table(name: "job_applications") {
  id: UUID! @default(expr: "uuidV4()")
  user: User! @ref
  snapshot: ApplicationSnapshot! @ref
  job: Job! @ref
  coverLetter: String
  appliedDate: Timestamp! @default(expr: "request.time")
  status: String @default(value: "Pending")
}

type HiredRecord @table(name: "hired_records") {
  id: UUID! @default(expr: "uuidV4()")
  user: User! @ref
  application: JobApplication! @ref 
  job: Job! @ref
  hiredDate: Timestamp! @default(expr: "request.time")
}

type CallForInterview @table(name: "call_for_interviews") {
  id: UUID! @default(expr: "uuidV4()")
  user: User! @ref
  application: JobApplication! @ref 
  job: Job! @ref
  interviewDate: Timestamp
  message: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type RejectRecord @table(name: "reject_records") {
  id: UUID! @default(expr: "uuidV4()")
  user: User! @ref
  application: JobApplication! @ref 
  job: Job! @ref
  reason: String
  rejectedDate: Timestamp! @default(expr: "request.time")
}


type ApplicationSnapshot @table(name: "application_snapshots") {
  id: UUID! @default(expr: "uuidV4()")
  jobRole: String!
  portfolioUrl: String
  currentOrg: String
  currentPosition: String
  personalStatement: String
  aboutMe: String
  cvUrl: String
  matchScore: Int          
  industryScore: Int
  CompanySkillMatchScore: Int
  createdAt: Timestamp! @default(expr: "request.time")
}



